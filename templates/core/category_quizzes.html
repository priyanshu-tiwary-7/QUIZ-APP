{% extends 'core/base.html' %}

{% block content %}

<h1 class="mb-4">
    {{ category.name }} Quizzes 🚀
</h1>

<div class="row">

    {% for quiz in quizzes %}

    <div class="col-md-4 mb-4">

        <div class="card shadow p-3">

            <h3>
                {{ quiz.title }}
            </h3>

            <p>
                Quiz from {{ category.name }}
            </p>
<a
    href="{% url 'start_quiz' quiz.id %}"
    class="btn btn-success"
>
    Start Quiz
</a>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
