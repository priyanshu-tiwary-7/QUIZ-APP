{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">
        Login
    </h2>

    {% for message in messages %}

        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>

    {% endfor %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            class="form-control mb-3"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="form-control mb-3"
            required
        >

        <button class="btn btn-primary">
            Login
        </button>

    </form>

</div>

{% endblock %}
