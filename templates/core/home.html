{% extends 'core/base.html' %}

{% block content %}

<h1 class="mb-4">
    Quiz Categories 🚀
</h1>

<div class="row">

    {% for category in categories %}

    <div class="col-md-4 mb-4">

        <div class="card shadow p-3">

            <h3>
                {{ category.name }}
            </h3>

            <p>
                Start quiz from this category.
            </p>

            <a href="{% url 'category_quizzes' category.id %}"
               class="btn btn-primary">
               View Quiz
            </a>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
